AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploys a Lambda function to collect AWS Security Hub cost estimation data (one-time execution)'

Parameters:
  CrossAccountRoleName:
    Type: String
    Default: SecurityHubCostEstimatorRole
    Description: Name of the read-only IAM role deployed in each account for cross-account access
  
  TargetRegion:
    Type: String
    Default: us-east-1
    Description: AWS region to collect data from
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
  
  AccountIds:
    Type: String
    Default: ''
    Description: '(Optional) Comma-separated list of account IDs. Leave empty to auto-discover via Organizations'

Resources:
  ResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'security-hub-cost-data-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  ResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ResultsBucket
      PolicyDocument:
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ResultsBucket.Arn
              - !Sub '${ResultsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubCostEstimatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # AssumeRole uses wildcard account ID because target accounts are
              # dynamically discovered via Organizations. The role name constraint
              # limits assumption to only the specific cost estimator role.
              - Sid: AssumeRoleInMemberAccounts
                Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::*:role/${CrossAccountRoleName}'
              # Organizations API does not support resource-level permissions
              - Sid: ListOrganizationAccounts
                Effect: Allow
                Action:
                  - organizations:ListAccounts
                  - organizations:DescribeOrganization
                Resource: '*'
              - Sid: WriteResultsToBucket
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub '${ResultsBucket.Arn}/*'

  CollectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubCostEstimator
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          ROLE_NAME: !Ref CrossAccountRoleName
          TARGET_REGION: !Ref TargetRegion
          RESULTS_BUCKET: !Ref ResultsBucket
          ACCOUNT_IDS: !Ref AccountIds
      Code:
        ZipFile: |
          import boto3
          import csv
          import os
          from datetime import datetime
          from concurrent.futures import ThreadPoolExecutor, as_completed
          
          def lambda_handler(event, context):
              role_name = os.environ['ROLE_NAME']
              region = os.environ['TARGET_REGION']
              bucket = os.environ['RESULTS_BUCKET']
              account_ids_param = os.environ.get('ACCOUNT_IDS', '')
              
              if account_ids_param:
                  account_ids = [a.strip() for a in account_ids_param.split(',')]
                  import re
                  account_ids = [a for a in account_ids if re.match(r'^\d{12}$', a)]
              else:
                  org = boto3.client('organizations')
                  paginator = org.get_paginator('list_accounts')
                  accounts = []
                  for page in paginator.paginate():
                      accounts.extend([a for a in page['Accounts'] if a['Status'] == 'ACTIVE'])
                  account_ids = [a['Id'] for a in accounts]
              
              print(f"Collecting data from {len(account_ids)} accounts in {region}")
              
              results = []
              with ThreadPoolExecutor(max_workers=5) as executor:
                  futures = {executor.submit(collect_account_data, acc, role_name, region): acc 
                            for acc in account_ids}
                  for future in as_completed(futures):
                      results.append(future.result())
              
              timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
              filename = f'security_hub_cost_data_{timestamp}.csv'
              
              csv_content = generate_csv(results)
              
              s3 = boto3.client('s3')
              s3.put_object(Bucket=bucket, Key=filename, Body=csv_content)
              
              print(f"Results saved to s3://{bucket}/{filename}")
              return {
                  'statusCode': 200,
                  'body': f'Data collection complete. Results: s3://{bucket}/{filename}'
              }
          
          def assume_role(account_id, role_name):
              sts = boto3.client('sts')
              role_arn = f'arn:aws:iam::{account_id}:role/{role_name}'
              try:
                  response = sts.assume_role(
                      RoleArn=role_arn,
                      RoleSessionName='SecurityHubCostEstimator'
                  )
                  return boto3.Session(
                      aws_access_key_id=response['Credentials']['AccessKeyId'],
                      aws_secret_access_key=response['Credentials']['SecretAccessKey'],
                      aws_session_token=response['Credentials']['SessionToken']
                  )
              except Exception as e:
                  print(f"Failed to assume role in {account_id}: {e}")
                  return None
          
          def collect_account_data(account_id, role_name, region):
              print(f"Processing {account_id}...")
              session = assume_role(account_id, role_name)
              if not session:
                  return {'account_id': account_id, 'region': region, 'error': 'Failed to assume role'}
              
              try:
                  ec2 = session.client('ec2', region_name=region)
                  ecr = session.client('ecr', region_name=region)
                  lambda_client = session.client('lambda', region_name=region)
                  iam = session.client('iam')
                  inspector = session.client('inspector2', region_name=region)
                  
                  instances = ec2.describe_instances()
                  ec2_count = sum(len(r['Instances']) for r in instances['Reservations'])
                  running = sum(1 for r in instances['Reservations'] 
                               for i in r['Instances'] if i['State']['Name'] == 'running')
                  ec2_hours = running * 24 * 30
                  
                  try:
                      repos = ecr.describe_repositories()
                      ecr_repos = len(repos['repositories'])
                      ecr_images = sum(len(ecr.describe_images(repositoryName=r['repositoryName'])['imageDetails'])
                                     for r in repos['repositories'])
                  except Exception as e:
                      print(f"ECR access error in {account_id}: {e}")
                      ecr_repos = ecr_images = 0
                  
                  lambda_funcs = []
                  paginator = lambda_client.get_paginator('list_functions')
                  for page in paginator.paginate():
                      lambda_funcs.extend(page['Functions'])
                  
                  users = []
                  user_paginator = iam.get_paginator('list_users')
                  for page in user_paginator.paginate():
                      users.extend(page['Users'])
                  
                  roles = []
                  role_paginator = iam.get_paginator('list_roles')
                  for page in role_paginator.paginate():
                      roles.extend(page['Roles'])
                  
                  # Amazon Inspector
                  inspector_enabled = False
                  lambda_scanned = 0
                  try:
                      coverage = inspector.list_coverage(maxResults=100)
                      inspector_enabled = True
                      lambda_scanned = sum(1 for item in coverage.get('coveredResources', [])
                                         if item.get('resourceType') == 'AWS_LAMBDA_FUNCTION')
                  except Exception as e:
                      print(f"Amazon Inspector not enabled in {account_id}: {e}")
                  
                  return {
                      'account_id': account_id,
                      'region': region,
                      'ec2_instances': ec2_count,
                      'ec2_monthly_hours': ec2_hours,
                      'ecr_repositories': ecr_repos,
                      'ecr_images': ecr_images,
                      'lambda_functions': len(lambda_funcs),
                      'iam_users': len(users),
                      'iam_roles': len(roles),
                      'inspector_enabled': inspector_enabled,
                      'lambda_scanned': lambda_scanned
                  }
              except Exception as e:
                  return {'account_id': account_id, 'region': region, 'error': str(e)}
          
          def generate_csv(results):
              output = []
              output.append(','.join([
                  'Account ID', 'Region', 'EC2 Instances', 'EC2 Monthly Hours',
                  'ECR Repositories', 'ECR Images', 'Lambda Functions',
                  'IAM Users', 'IAM Roles', 'Amazon Inspector Enabled', 'Lambda Scanned', 'Error'
              ]))
              for d in results:
                  output.append(','.join([
                      str(d.get('account_id', '')),
                      str(d.get('region', '')),
                      str(d.get('ec2_instances', 0)),
                      str(d.get('ec2_monthly_hours', 0)),
                      str(d.get('ecr_repositories', 0)),
                      str(d.get('ecr_images', 0)),
                      str(d.get('lambda_functions', 0)),
                      str(d.get('iam_users', 0)),
                      str(d.get('iam_roles', 0)),
                      str(d.get('inspector_enabled', False)),
                      str(d.get('lambda_scanned', 0)),
                      str(d.get('error', ''))
                  ]))
              return '\n'.join(output)

  TriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubCostEstimatorTrigger
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TriggerRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          def handler(event, context):
              if event['RequestType'] == 'Create':
                  try:
                      lambda_client = boto3.client('lambda')
                      response = lambda_client.invoke(
                          FunctionName=event['ResourceProperties']['FunctionName'],
                          InvocationType='Event'
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  except Exception as e:
                      print(f"Error: {e}")
                      cfnresponse.send(event, context, cfnresponse.FAILED, {})
              else:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
  
  TriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt CollectorFunction.Arn
  
  TriggerLambda:
    Type: Custom::TriggerLambda
    Properties:
      ServiceToken: !GetAtt TriggerFunction.Arn
      FunctionName: !Ref CollectorFunction

Outputs:
  ResultsBucket:
    Description: S3 bucket containing cost estimation results
    Value: !Ref ResultsBucket
  
  LambdaFunction:
    Description: Lambda function that collects the data
    Value: !Ref CollectorFunction
  
  NextSteps:
    Description: What to do next
    Value: !Sub 'Check s3://${ResultsBucket}/ for results CSV file. Deploy member-account-role.yaml to each account first.'
