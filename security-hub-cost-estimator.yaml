AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploys a Lambda function to collect AWS Security Hub cost estimation data (one-time execution) - (uksb-rc5ocfsf2w)'

Parameters:
  CrossAccountRoleName:
    Type: String
    Default: SecurityHubCostEstimatorRole
    Description: Name of the read-only IAM role deployed in each account for cross-account access
  
  TargetRegion:
    Type: String
    Default: us-east-1
    Description: AWS region to collect data from
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
  
  ManagementAccountId:
    Type: String
    AllowedPattern: '\d{12}'
    Description: AWS Organizations management (payer) account ID. Used to retrieve EC2 hours from Cost Explorer.
    ConstraintDescription: Must be a 12-digit AWS account ID

  AccountIds:
    Type: String
    Default: ''
    Description: '(Optional) Comma-separated list of account IDs. Leave empty to auto-discover via Organizations'

Resources:
  ResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'security-hub-cost-data-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  ResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ResultsBucket
      PolicyDocument:
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ResultsBucket.Arn
              - !Sub '${ResultsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubCostEstimatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # AssumeRole uses wildcard account ID because target accounts are
              # dynamically discovered via Organizations. The role name constraint
              # limits assumption to only the specific cost estimator role.
              - Sid: AssumeRoleInMemberAccounts
                Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::*:role/${CrossAccountRoleName}'
              # Organizations API does not support resource-level permissions
              - Sid: ListOrganizationAccounts
                Effect: Allow
                Action:
                  - organizations:ListAccounts
                  - organizations:DescribeOrganization
                Resource: '*'
              - Sid: WriteResultsToBucket
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub '${ResultsBucket.Arn}/*'

  CollectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubCostEstimator
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          ROLE_NAME: !Ref CrossAccountRoleName
          TARGET_REGION: !Ref TargetRegion
          RESULTS_BUCKET: !Ref ResultsBucket
          ACCOUNT_IDS: !Ref AccountIds
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountId
      Code:
        ZipFile: |
          import boto3
          import csv
          import os
          from datetime import datetime, timedelta, timezone
          from concurrent.futures import ThreadPoolExecutor, as_completed
          
          def lambda_handler(event, context):
              role_name = os.environ['ROLE_NAME']
              region = os.environ['TARGET_REGION']
              bucket = os.environ['RESULTS_BUCKET']
              account_ids_param = os.environ.get('ACCOUNT_IDS', '')
              mgmt_account_id = os.environ['MANAGEMENT_ACCOUNT_ID']
              
              if account_ids_param:
                  import re
                  account_ids = [a.strip() for a in account_ids_param.split(',')]
                  account_ids = [a for a in account_ids if re.match(r'^\d{12}$', a)]
              else:
                  org = boto3.client('organizations')
                  paginator = org.get_paginator('list_accounts')
                  accounts = []
                  for page in paginator.paginate():
                      accounts.extend([a for a in page['Accounts'] if a['Status'] == 'ACTIVE'])
                  account_ids = [a['Id'] for a in accounts]
              
              # Exclude management account from member collection
              account_ids = [a for a in account_ids if a != mgmt_account_id]
              
              # Get org-wide EC2 hours from management account Cost Explorer
              ec2_hours = 0
              mgmt_session = assume_role(mgmt_account_id, role_name)
              if mgmt_session:
                  ec2_hours = get_ec2_hours_from_cost_explorer(mgmt_session, region)
                  print(f"Org-wide EC2 hours (from management account): {ec2_hours}")
              else:
                  print("WARNING: Could not assume role in management account for Cost Explorer data")
              
              print(f"Collecting data from {len(account_ids)} member accounts in {region}")
              
              results = []
              with ThreadPoolExecutor(max_workers=5) as executor:
                  futures = {executor.submit(collect_account_data, acc, role_name, region): acc 
                            for acc in account_ids}
                  for future in as_completed(futures):
                      results.append(future.result())
              
              timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
              filename = f'security_hub_cost_data_{timestamp}.csv'
              
              csv_content = generate_csv(results, ec2_hours)
              
              s3 = boto3.client('s3')
              s3.put_object(Bucket=bucket, Key=filename, Body=csv_content)
              
              print(f"Results saved to s3://{bucket}/{filename}")
              return {
                  'statusCode': 200,
                  'body': f'Data collection complete. Results: s3://{bucket}/{filename}'
              }
          
          def assume_role(account_id, role_name):
              sts = boto3.client('sts')
              role_arn = f'arn:aws:iam::{account_id}:role/{role_name}'
              try:
                  response = sts.assume_role(
                      RoleArn=role_arn,
                      RoleSessionName='SecurityHubCostEstimator'
                  )
                  return boto3.Session(
                      aws_access_key_id=response['Credentials']['AccessKeyId'],
                      aws_secret_access_key=response['Credentials']['SecretAccessKey'],
                      aws_session_token=response['Credentials']['SessionToken']
                  )
              except Exception as e:
                  print(f"Failed to assume role in {account_id}: {e}")
                  return None
          
          def get_ec2_hours_from_cost_explorer(session, region):
              ce = session.client('ce', region_name=region)
              now = datetime.now(timezone.utc)
              start = (now.replace(day=1) - timedelta(days=1)).replace(day=1).strftime('%Y-%m-%d')
              end = now.replace(day=1).strftime('%Y-%m-%d')
              try:
                  resp = ce.get_cost_and_usage(
                      TimePeriod={'Start': start, 'End': end},
                      Granularity='MONTHLY',
                      Metrics=['UsageQuantity'],
                      Filter={'Dimensions': {'Key': 'SERVICE', 'Values': ['Amazon Elastic Compute Cloud - Compute']}}
                  )
                  for result in resp.get('ResultsByTime', []):
                      return float(result['Total']['UsageQuantity']['Amount'])
              except Exception as e:
                  print(f"Cost Explorer error: {e}")
              return 0
          
          def get_active_lambda_from_inspector(inspector):
              try:
                  funcs = set()
                  paginator = inspector.get_paginator('list_coverage')
                  for page in paginator.paginate(
                      filterCriteria={'resourceType': [{'comparison': 'EQUALS', 'value': 'AWS_LAMBDA_FUNCTION'}]}
                  ):
                      for item in page.get('coveredResources', []):
                          funcs.add(item.get('resourceId', ''))
                  return True, len(funcs)
              except Exception:
                  return False, 0
          
          def get_active_lambda_from_api(lambda_client):
              cutoff = datetime.now(timezone.utc) - timedelta(days=90)
              count = 0
              paginator = lambda_client.get_paginator('list_functions')
              for page in paginator.paginate():
                  for fn in page['Functions']:
                      last_modified = fn.get('LastModified', '')
                      if last_modified:
                          mod_time = datetime.fromisoformat(last_modified.replace('+0000', '+00:00'))
                          if mod_time >= cutoff:
                              count += 1
              return count
          
          def get_recent_ecr_images_from_inspector(inspector):
              try:
                  count = 0
                  paginator = inspector.get_paginator('list_coverage')
                  for page in paginator.paginate(
                      filterCriteria={'resourceType': [{'comparison': 'EQUALS', 'value': 'AWS_ECR_CONTAINER_IMAGE'}]}
                  ):
                      count += len(page.get('coveredResources', []))
                  return True, count
              except Exception:
                  return False, 0
          
          def get_recent_ecr_images_from_api(ecr):
              cutoff = datetime.now(timezone.utc) - timedelta(days=7)
              count = 0
              try:
                  repos = ecr.describe_repositories()
                  for repo in repos.get('repositories', []):
                      paginator = ecr.get_paginator('describe_images')
                      for page in paginator.paginate(repositoryName=repo['repositoryName']):
                          for img in page.get('imageDetails', []):
                              if img.get('imagePushedAt') and img['imagePushedAt'] >= cutoff:
                                  count += 1
              except Exception as e:
                  print(f"ECR access error: {e}")
              return count
          
          def collect_account_data(account_id, role_name, region):
              print(f"Processing {account_id}...")
              session = assume_role(account_id, role_name)
              if not session:
                  return {'account_id': account_id, 'region': region, 'error': 'Failed to assume role'}
              
              try:
                  ecr = session.client('ecr', region_name=region)
                  lambda_client = session.client('lambda', region_name=region)
                  iam = session.client('iam')
                  inspector = session.client('inspector2', region_name=region)
                  
                  inspector_ecr, ecr_images = get_recent_ecr_images_from_inspector(inspector)
                  if not inspector_ecr:
                      ecr_images = get_recent_ecr_images_from_api(ecr)
                  
                  inspector_lambda, lambda_count = get_active_lambda_from_inspector(inspector)
                  if not inspector_lambda:
                      lambda_count = get_active_lambda_from_api(lambda_client)
                  
                  users = []
                  user_paginator = iam.get_paginator('list_users')
                  for page in user_paginator.paginate():
                      users.extend(page['Users'])
                  
                  roles = []
                  role_paginator = iam.get_paginator('list_roles')
                  for page in role_paginator.paginate():
                      roles.extend(page['Roles'])
                  
                  return {
                      'account_id': account_id,
                      'region': region,
                      'ecr_images_recent': ecr_images,
                      'lambda_functions_active': lambda_count,
                      'iam_users': len(users),
                      'iam_roles': len(roles),
                      'data_source_ecr': 'Inspector' if inspector_ecr else 'ECR API',
                      'data_source_lambda': 'Inspector' if inspector_lambda else 'Lambda API',
                  }
              except Exception as e:
                  return {'account_id': account_id, 'region': region, 'error': str(e)}
          
          def generate_csv(results, ec2_hours):
              output = []
              output.append(','.join([
                  'Account ID', 'Region',
                  'ECR Images (Last 7 Days)', 'Lambda Functions (Active 90 Days)',
                  'IAM Users', 'IAM Roles',
                  'Data Source ECR', 'Data Source Lambda', 'Error'
              ]))
              for d in results:
                  output.append(','.join([
                      str(d.get('account_id', '')),
                      str(d.get('region', '')),
                      str(d.get('ecr_images_recent', 0)),
                      str(d.get('lambda_functions_active', 0)),
                      str(d.get('iam_users', 0)),
                      str(d.get('iam_roles', 0)),
                      str(d.get('data_source_ecr', '')),
                      str(d.get('data_source_lambda', '')),
                      str(d.get('error', ''))
                  ]))
              output.append('')
              output.append(f'Org-Wide EC2 Monthly Hours (from Cost Explorer),{ec2_hours}')
              output.append(f'Avg EC2 Instances (Hours/720),{round(ec2_hours / 720, 2)}')
              return '\n'.join(output)

  TriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubCostEstimatorTrigger
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TriggerRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          def handler(event, context):
              if event['RequestType'] == 'Create':
                  try:
                      lambda_client = boto3.client('lambda')
                      response = lambda_client.invoke(
                          FunctionName=event['ResourceProperties']['FunctionName'],
                          InvocationType='Event'
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  except Exception as e:
                      print(f"Error: {e}")
                      cfnresponse.send(event, context, cfnresponse.FAILED, {})
              else:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
  
  TriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt CollectorFunction.Arn
  
  TriggerLambda:
    Type: Custom::TriggerLambda
    Properties:
      ServiceToken: !GetAtt TriggerFunction.Arn
      FunctionName: !Ref CollectorFunction

Outputs:
  ResultsBucket:
    Description: S3 bucket containing cost estimation results
    Value: !Ref ResultsBucket
  
  LambdaFunction:
    Description: Lambda function that collects the data
    Value: !Ref CollectorFunction
  
  NextSteps:
    Description: What to do next
    Value: !Sub 'Check s3://${ResultsBucket}/ for results CSV file. Deploy member-account-role.yaml to each account first.'
